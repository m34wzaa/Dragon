<!doctype HTML>
<html>
	<meta charset=UTF-8>
	<head>
		<style>  
			body {
				color: #222222
			}
			* {

			}
			#box {
				display: inline-flex;

				padding: 8px 12px;
				border-radius: 0px;
			}
			#hud {
				position: fixed;
				top: 10px;
				left: 10px;
				color: #000000;

			}
			#pauseMenu {

				inset: 0;
				background: rgba(0, 0, 0, 0.85);

				border: none;

				font-size: 25px;
				font-family: monospace;
				pointer-events: all;
			}
			#chat {
			    position: fixed;
			    bottom: 10px;
			    left: 10px;
			    width: 320px;
			    padding: 6px 12px;
			    background: rgba(0, 0, 0, 0.5);
			    border: 1px solid rgba(255, 255, 255, 0.2);
			    font-family: monospace;
			    font-size: 13px;
			    color: #ffffff;
			    display: flex;
			    flex-direction: column;
			    gap: 4px;
			    z-index: 10;
			}
			
			#chatMessages {
			    display: flex;
			    flex-direction: column;
			    gap: 2px;
			    max-height: 140px;
			    overflow-y: auto;
			    overflow-x: hidden;
			    scrollbar-width: none; 
			}
			
			#chatMessages::-webkit-scrollbar {
			    display: none; 
			}
			
			#chatInputRow {
			    display: flex;
			    gap: 6px;
			    margin-top: 4px;
			}
			
			#chatInput {
				display: none;
			    flex: 1;
			    background: transparent;
			    border: none;
			    border-bottom: 1px solid rgba(255, 255, 255, 0.4);
			    color: #ffffff;
			    font-family: monospace;
			    font-size: 13px;
			    outline: none;
			    padding: 2px 0;
			    pointer-events: all;
			}
			
			#chatInput::placeholder {
			    color: rgba(255, 255, 255, 0.3);
			}
			
			.chatMsg {
			    word-break: break-word;
			    line-height: 1.4;
			    opacity: 1;
			    transition: opacity 0.5s;
			}
			
			.chatMsg.fading {
			    opacity: 0;
			}

		</style>
		<link rel="icon" type="image/png" href="icon.png">
	</head>
	<body>
		<div id="startScreen">
			<h2>gaem</h2>
			<label>seed</label>
			<input id="seedInput" type="number" value="1" min="1">
			<label>username</label>
			<input id="nameInput" type="text" placeholder="derg" maxlength="16" style="
				padding: 6px 12px;

				">
			<label>indicator colour:</label>
			<input id="colorInput" type="color" value="#000000" style="
				width: 60px; height: 36px;
				border: 1px solid #fff;
				background: #111;
				cursor: pointer;
				padding: 2px;
				">
			<button id="playBtn"><h2>join</button>
		</div>
		<div id="hud">
			<div id="box">
				<div id="coords">x: 0 &nbsp; y: 0 &nbsp; z: 0</div>
				<div id="seedDisplay">Seed: 1</div>
				<div id="peakDisplay">Peak: - &nbsp; at (-, -, -)</div>
				<div id="max">max: - &nbsp; 1</div>
				<div>Render Distance:</div>
				<input type="range" min="1" max="32" step=1 id="renderDist" value ="8" style="pointer-events: all;">
				<button id="peakBtn" onclick="teleportToPeak()" style="
					margin-top: 4px;
					padding: 3px 10px;
					background: #ffffff;
					color: #000;
					border: none;
					cursor: pointer;
					font-size: 12px;
					font-family: monospace;
					pointer-events: all;
					">go to peak</button>
			</div>
			<div id="controls" style="
				position: fixed;
				top: 10px;
				right: 10px;
				background: rgba(255, 255, 255, 0.45);
				border: 1px solid #000000;
				padding: 8px 12px;
				font-family: monospace;
				font-size: 13px;
				color: #000;
				display: inline-flex;
				flex-direction: column;
				gap: 4px;
				pointer-events: none;
				">
				<div><h2><b>tha controls</b></h2></div>
				<div>w/s pitch and move</div>
				<div>a/d roll and turn</div>
				<div>space to go up when on ground</div>
				<div>j tuck wings to go faster</div>

			</div>
			<div id="chat">
			    <div id="chatMessages"></div>
			    <div id="chatInputRow">
			        <input id="chatInput" type="text" placeholder="press t to chat" maxlength="80">
			    </div>
			</div>
			<div id="pauseMenu">
				<h2>Stances</h2>
			</div>
		</div>

		<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
		<script type="importmap">
			{
				"imports": {
					"three": "https://unpkg.com/three@0.161.0/build/three.module.js",
					"three/examples/jsm/": "https://unpkg.com/three@0.161.0/examples/jsm/"
				}
			}
		</script>
		<script type="module">
			import * as THREE from 'https://unpkg.com/three@latest/build/three.module.js';
			import { GLTFLoader } from 'https://unpkg.com/three@latest/examples/jsm/loaders/GLTFLoader.js';
			function createNoise(seed) {
				const p = new Uint8Array(512);
				const permBase = new Uint8Array(256);
				for (let i = 0; i < 256; i++) permBase[i] = i;
				let s = seed % 65536 || 1;
				for (let i = 255; i > 0; i--) {
					s = (s * 16807) % 2147483647;
					const j = s % (i + 1);
					[permBase[i], permBase[j]] = [permBase[j], permBase[i]];
				}
				for (let i = 0; i < 512; i++) p[i] = permBase[i & 255];

				function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
				function lerp(a, b, t) { return a + t * (b - a); }
				function grad(h, x, y) {
					h &= 3;
					const u = h < 2 ? x : y;
					const v = h < 2 ? y : x;
					return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
				}
				return function perlin2(x, y) {
					const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
					x -= Math.floor(x); y -= Math.floor(y);
					const u = fade(x), v = fade(y);
					const a = p[X] + Y, b = p[X + 1] + Y;
					return lerp(
						lerp(grad(p[a],   x,   y), grad(p[b],   x-1, y),   u),
						lerp(grad(p[a+1], x,   y-1), grad(p[b+1], x-1, y-1), u), v
					);
				};
			}
			const scene = new THREE.Scene();
			let vel = new THREE.Vector3();
			scene.background = new THREE.Color(0x222222);
			let dist = 50000;
			scene.fog = new THREE.Fog(0x222222, dist - (dist * 0.1), dist);
			let fov = 90;
			const cam = new THREE.PerspectiveCamera(fov, window.innerWidth / window.innerHeight, 0.01, dist);
			cam.position.z = 0;
			cam.position.y = 500;
			const skyGeo = new THREE.SphereGeometry(dist * 0.9, 32, 32);
			const skyMat = new THREE.ShaderMaterial({
				uniforms: {
					topColor: { value: new THREE.Color(0x3073AA) }, 
					bottomColor: { value: new THREE.Color(0x463593) }, 
					offset: { value: 0.3 },
					exponent: { value: 0.6 }
				},
				vertexShader: `
					varying vec3 vWorldPosition;
					void main() {
					vec4 worldPos = modelMatrix * vec4(position, 1.0);
					vWorldPosition = worldPos.xyz;
					gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
					}
					`,
				fragmentShader: `
					uniform vec3 topColor;
					uniform vec3 bottomColor;
					uniform float offset;
					uniform float exponent;
					varying vec3 vWorldPosition;
					void main() {
					float h = normalize(vWorldPosition).y + offset;
					gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(h, exponent), 0.0)), 1.0);
					}
					`,
				side: THREE.BackSide
			});
			const sky = new THREE.Mesh(skyGeo, skyMat);
			scene.add(sky);
			scene.background = null; 


			const n = 0
			const loader = new GLTFLoader();
			let head, torso, tail1, tail2, wing1, wing2;

			function loadGLB(path) {
				return new Promise((resolve) => {
					loader.load(path, (gltf) => {
						const part = gltf.scene;
						const box = new THREE.Box3().setFromObject(part);
						const center = new THREE.Vector3();
						box.getCenter(center);
						part.position.sub(center);
						resolve(part);
					});
				});
			}


			Promise.all([
				loadGLB('tex2/head2.glb'),
				loadGLB('tex2/torso2.glb'),
				loadGLB('tex2/tail12.glb'),
				loadGLB('tex2/tail22.glb'),
				loadGLB('tex2/wing12.glb'),
				loadGLB('tex2/wing22.glb'),
			]).then(([h, to, t1, t2, w1, w2]) => {
				head = h; torso = to;
				tail1 = t1; tail2 = t2;
				wing1 = w1; wing2 = w2;
				torso.add(head);
				torso.add(wing1);
				torso.add(wing2);
				torso.add(tail1);
				tail1.add(tail2);
				head.name  = 'dreg_head';
				wing1.name = 'dreg_wing1';
				wing2.name = 'dreg_wing2';
				tail1.name = 'dreg_tail1';
				tail2.name = 'dreg_tail2';
				head.position.set(0, 0, -0.001);
				head.scale.setScalar(0.7);
				wing2.position.set(-.0014, -0.0005, -0.001);
				wing1.position.set(.0014, -0.0005, -0.001);
				tail1.position.set(0, 0, -0.002);
				tail2.position.set(0, 0, -0.003);
				wing1.rotation.y = -3.6;
				wing2.rotation.y = 3.6;
				head.rotation.y = 0;
				torso.scale.setScalar(200);
				scene.add(torso);
				torso.position.set(0, 500, 0);
				vel.set(0, 0, -0.5);

			});

			let worldSeed = 1;
			let perlin2 = null;
			let gameStarted = false;
			const chunkSize = 100;
			const chunkSegs = 50;
			let viewDist  = 8; 
			const chunks = {};
			const slider = document.getElementById("renderDist")
			slider.addEventListener('input', () => {
				viewDist = Number(slider.value);
			});

			const chunkDecorations = {};
			const grassPerChunk = 600;
			const treeAttemptsPerChunk = 0;
			const bushAttemptsPerChunk = 0;
			const rockAttemptsPerChunk = 0;
			const grassMaxHeight = 42;
			const treeMaxHeight = 58;
			const bushMaxHeight = 48;
			const rockMinHeight = 120;
			const grassRadius = 1;

			const grassPlane = new THREE.PlaneGeometry(0.35, 0.45, 1, 2);
			grassPlane.translate(0, 0.225, 0);

			const grassMaterial = new THREE.ShaderMaterial({
				uniforms: {
					time: { value: 0 }
				},
				vertexShader: `
					uniform float time;
					varying vec2 vUv;
					varying float vShade;
					void main() {
						vUv = uv;
						vec3 p = position;
						vec4 worldBase = modelMatrix * instanceMatrix * vec4(0.0, 0.0, 0.0, 1.0);
						float phase = time * 1.7 + worldBase.x * 0.08 + worldBase.z * 0.06;
						float bend = sin(phase) * 0.09 * uv.y;
						float bend2 = cos(phase * 0.7) * 0.05 * uv.y;
						p.x += bend;
						p.z += bend2;
						vShade = 0.45 + uv.y * 0.55;
						gl_Position = projectionMatrix * modelViewMatrix * instanceMatrix * vec4(p, 1.0);
					}
				`,
				fragmentShader: `
					varying vec2 vUv;
					varying float vShade;
					void main() {
						float center = abs(vUv.x - 0.5) * 2.0;
						float width = mix(0.95, 0.08, vUv.y);
						float alpha = smoothstep(width + 0.08, width - 0.02, center);
						alpha *= smoothstep(0.0, 0.12, vUv.y);
						alpha *= smoothstep(1.0, 0.72, vUv.y);
						vec3 base = mix(vec3(0.08, 0.24, 0.05), vec3(0.26, 0.62, 0.16), vShade);
						gl_FragColor = vec4(base, alpha);
						if (gl_FragColor.a < 0.08) discard;
					}
				`,
				side: THREE.DoubleSide,
				transparent: true,
				depthWrite: false
			});

			function mulberry32(a) {
				return function() {
					let t = a += 0x6D2B79F5;
					t = Math.imul(t ^ t >>> 15, t | 1);
					t ^= t + Math.imul(t ^ t >>> 7, t | 61);
					return ((t ^ t >>> 14) >>> 0) / 4294967296;
				};
			}

			function hash2(a, b, c = 0) {
				let h = (a * 374761393 + b * 668265263 + c * 1442695040888963407) ^ worldSeed;
				h = Math.imul(h ^ (h >>> 13), 1274126177);
				return (h ^ (h >>> 16)) >>> 0;
			}

			function heightAt(wx, wz) {
				const raw =
					perlin2(wx * 0.003, wz * 0.003) * 1.0 +
					perlin2(wx * 0.012, wz * 0.012) * 0.3 +
					perlin2(wx * 0.04, wz * 0.04) * 0.08;
				const shifted = raw + 1.4;
				const sharp = Math.pow(shifted / 2.8, 6) * 2.8;
				return sharp * 500;
			}

			function normalAt(wx, wz) {
				const e = 1.5;
				const hL = heightAt(wx - e, wz);
				const hR = heightAt(wx + e, wz);
				const hD = heightAt(wx, wz - e);
				const hU = heightAt(wx, wz + e);
				return new THREE.Vector3(hL - hR, e * 2, hD - hU).normalize();
			}

			function makeTree(rand) {
				const g = new THREE.Group();
				const trunk = new THREE.Mesh(
					new THREE.CylinderGeometry(0.18, 0.28, 2.6, 6),
					new THREE.MeshStandardMaterial({ color: 0x6b4526, roughness: 1 })
				);
				trunk.position.y = 1.3;
				g.add(trunk);
				const leaves1 = new THREE.Mesh(
					new THREE.ConeGeometry(1.2, 2.2, 7),
					new THREE.MeshStandardMaterial({ color: 0x255d1d, roughness: 1 })
				);
				leaves1.position.y = 3.1;
				g.add(leaves1);
				const leaves2 = new THREE.Mesh(
					new THREE.ConeGeometry(0.95, 1.8, 7),
					new THREE.MeshStandardMaterial({ color: 0x2f7a22, roughness: 1 })
				);
				leaves2.position.y = 4.1;
				g.add(leaves2);
				const s = 0.8 + rand() * 1.1;
				g.scale.setScalar(s);
				return g;
			}

			function makeBush(rand) {
				const g = new THREE.Group();
				for (let i = 0; i < 3; i++) {
					const blob = new THREE.Mesh(
						new THREE.SphereGeometry(0.7 + rand() * 0.35, 7, 7),
						new THREE.MeshStandardMaterial({ color: 0x2c6a1d, roughness: 1 })
					);
					blob.position.set(
						(rand() - 0.5) * 0.8,
						0.5 + rand() * 0.4,
						(rand() - 0.5) * 0.8
					);
					g.add(blob);
				}
				const s = 0.7 + rand() * 0.9;
				g.scale.setScalar(s);
				return g;
			}

			function makeRock(rand) {
				const geo = new THREE.DodecahedronGeometry(0.7 + rand() * 1.2, 0);
				const mat = new THREE.MeshStandardMaterial({
					color: new THREE.Color().setScalar(0.35 + rand() * 0.18),
					roughness: 1,
					metalness: 0
				});
				const rock = new THREE.Mesh(geo, mat);
				rock.scale.set(
					0.8 + rand() * 1.1,
					0.6 + rand() * 0.9,
					0.8 + rand() * 1.1
				);
				return rock;
			}

			function buildDecorationsForChunk(cx, cz) {
				const key = chunkKey(cx, cz);
				const rand = mulberry32(hash2(cx, cz, 99));
				const meshes = [];
				const grass = new THREE.InstancedMesh(grassPlane, grassMaterial, grassPerChunk);
				const dummy = new THREE.Object3D();
				let grassCount = 0;

				for (let i = 0; i < grassPerChunk; i++) {
					const wx = cx * chunkSize + (rand() - 0.5) * chunkSize;
					const wz = cz * chunkSize + (rand() - 0.5) * chunkSize;
					const h = heightAt(wx, wz);
					if (h > grassMaxHeight) continue;
					const nrm = normalAt(wx, wz);
					if (nrm.y < 0.82) continue;
					dummy.position.set(wx, h + 0.01, wz);
					dummy.rotation.set(0, rand() * Math.PI * 2, 0);
					const s = 0.6 + rand() * 0.6;
					dummy.scale.set(s, s, s);
					dummy.updateMatrix();
					grass.setMatrixAt(grassCount++, dummy.matrix);
				}

				grass.count = grassCount;
				grass.instanceMatrix.needsUpdate = true;
				grass.visible = false;
				if (grassCount > 0) {
					scene.add(grass);
					meshes.push(grass);
				}

				for (let i = 0; i < treeAttemptsPerChunk; i++) {
					const wx = cx * chunkSize + (rand() - 0.5) * chunkSize;
					const wz = cz * chunkSize + (rand() - 0.5) * chunkSize;
					const h = heightAt(wx, wz);
					const nrm = normalAt(wx, wz);
					if (h > treeMaxHeight || nrm.y < 0.9) continue;
					if (rand() < 0.45) continue;
					const treeRand = mulberry32(hash2(Math.floor(wx), Math.floor(wz), 7));
					const tree = makeTree(treeRand);
					tree.position.set(wx, h, wz);
					scene.add(tree);
					meshes.push(tree);
				}

				for (let i = 0; i < bushAttemptsPerChunk; i++) {
					const wx = cx * chunkSize + (rand() - 0.5) * chunkSize;
					const wz = cz * chunkSize + (rand() - 0.5) * chunkSize;
					const h = heightAt(wx, wz);
					const nrm = normalAt(wx, wz);
					if (h > bushMaxHeight || nrm.y < 0.86) continue;
					if (rand() < 0.38) continue;
					const bushRand = mulberry32(hash2(Math.floor(wx), Math.floor(wz), 13));
					const bush = makeBush(bushRand);
					bush.position.set(wx, h, wz);
					bush.rotation.y = rand() * Math.PI * 2;
					bush.scale.multiplyScalar(0.75 + rand() * 1.05);
					scene.add(bush);
					meshes.push(bush);
				}

				for (let i = 0; i < rockAttemptsPerChunk; i++) {
					const wx = cx * chunkSize + (rand() - 0.5) * chunkSize;
					const wz = cz * chunkSize + (rand() - 0.5) * chunkSize;
					const h = heightAt(wx, wz);
					const nrm = normalAt(wx, wz);
					if (h < rockMinHeight || nrm.y > 0.82) continue;
					if (rand() < 0.35) continue;
					const rockRand = mulberry32(hash2(Math.floor(wx), Math.floor(wz), 27));
					const rock = makeRock(rockRand);
					rock.position.set(wx, h + 0.15, wz);
					rock.rotation.set(rockRand() * 0.5, rockRand() * Math.PI * 2, rockRand() * 0.5);
					scene.add(rock);
					meshes.push(rock);
				}

				chunkDecorations[key] = { meshes };
			}

			function chunkKey(cx, cz) { return `${cx},${cz}`; }

			function makeChunk(cx, cz) {
				const geo = new THREE.PlaneGeometry(chunkSize, chunkSize, chunkSegs, chunkSegs);
				geo.rotateX(-Math.PI / 2);
				const pos = geo.attributes.position;

				for (let i = 0; i < pos.count; i++) {
					const wx = pos.getX(i) + cx * chunkSize;
					const wz = pos.getZ(i) + cz * chunkSize;

					const raw =
						perlin2(wx * 0.003, wz * 0.003) * 1.0 +
						perlin2(wx * 0.012, wz * 0.012) * 0.3 +
						perlin2(wx * 0.04,  wz * 0.04)  * 0.08;

					const shifted = raw + 1.4;
					const sharp = Math.pow(shifted / 2.8, 6) * 2.8;
					const h = sharp * 500;

					pos.setY(i, h);
				}
				pos.needsUpdate = true;
				geo.computeVertexNormals();
				const normals = geo.attributes.normal;
				const colors  = new Float32Array(pos.count * 3);

				for (let i = 0; i < pos.count; i++) {
					const ny = normals.getY(i);
					const yy = pos.getY(i);
					const c = THREE.MathUtils.clamp((ny - 0.5) / 0.5, 0.15, 1.0);
					if (yy < 40 && c > 0.4) {
						colors[i * 3 + 0] = 0.2
						colors[i * 3 + 1] = 0.5
						colors[i * 3 + 2] = 0.1
					} else {
						colors[i * 3]     = c;
						colors[i * 3 + 1] = c;
						colors[i * 3 + 2] = c;
					}
				}
				geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

				const mat = new THREE.MeshStandardMaterial({
					vertexColors: true,
					flatShading: false
				});

				const mesh = new THREE.Mesh(geo, mat);
				mesh.position.set(cx * chunkSize, 0, cz * chunkSize);
				scene.add(mesh);
				groundMeshes.push(mesh);
				scanChunkForPeak(cx, cz);
				buildDecorationsForChunk(cx, cz);
				return mesh;
			}

			function updateChunks() {
				if (!torso || !gameStarted || !perlin2) return;

				const cx = Math.round(torso.position.x / chunkSize);
				const cz = Math.round(torso.position.z / chunkSize);

				for (let dx = -viewDist; dx <= viewDist; dx++) {
					for (let dz = -viewDist; dz <= viewDist; dz++) {
						const key = chunkKey(cx + dx, cz + dz);
						if (!chunks[key]) {
							chunks[key] = makeChunk(cx + dx, cz + dz);
						}
					}
				}

				for (const key in chunkDecorations) {
					const [kcx, kcz] = key.split(',').map(Number);
					const inGrassRange = Math.abs(kcx - cx) <= grassRadius && Math.abs(kcz - cz) <= grassRadius;
					for (const mesh of chunkDecorations[key].meshes) {
						if (mesh.isInstancedMesh) mesh.visible = inGrassRange;
					}
				}

				for (const key in chunks) {
					const [kcx, kcz] = key.split(',').map(Number);
					if (Math.abs(kcx - cx) > viewDist + 1 || Math.abs(kcz - cz) > viewDist + 1) {
						scene.remove(chunks[key]);
						groundMeshes.splice(groundMeshes.indexOf(chunks[key]), 1);
						chunks[key].geometry.dispose();
						chunks[key].material.dispose();
						delete chunks[key];

						const deco = chunkDecorations[key];
						if (deco) {
							for (const mesh of deco.meshes) {
								scene.remove(mesh);
								if (mesh.geometry) mesh.geometry.dispose?.();
								if (Array.isArray(mesh.material)) {
									for (const m of mesh.material) m.dispose?.();
								} else {
									mesh.material?.dispose?.();
								}
								mesh.traverse?.((child) => {
									child.geometry?.dispose?.();
									if (Array.isArray(child.material)) {
										for (const m of child.material) m.dispose?.();
									} else {
										child.material?.dispose?.();
									}
								});
							}
							delete chunkDecorations[key];
						}
					}
				}
			}
			function scanChunkForPeak(cx, cz) {
				const step = 1;
				for (let wx = cx * chunkSize; wx <= (cx + 1) * chunkSize; wx += step) {
					for (let wz = cz * chunkSize; wz <= (cz + 1) * chunkSize; wz += step) {
						const raw =
							perlin2(wx * 0.003, wz * 0.003) * 1.0 +
							perlin2(wx * 0.012, wz * 0.012) * 0.3 +
							perlin2(wx * 0.04,  wz * 0.04)  * 0.08;
						const shifted = raw + 1.4;
						const sharp = Math.pow(shifted / 2.8, 6) * 2.8;
						const h = sharp * 500;
						if (h > peakY) {
							peakY = h;
							peakX = wx;
							peakZ = wz;
							document.getElementById('peakDisplay').textContent =
								`Peak: ${peakY.toFixed(0)}  at (${peakX.toFixed(0)}, ${peakY.toFixed(0)}, ${peakZ.toFixed(0)})`;
						}
					}
				}
			}

			let maxx = 0;
			async function findPeak() {
				document.getElementById('peakDisplay').textContent = `Peak: searching...`;
				let x = 0, z = 0;
				let step = 1, stepCount = 0, dir = 0, turns = 0;
				const stepSize = 1; 
				const dx = [stepSize, 0, -stepSize, 0];
				const dz = [0, stepSize, 0, -stepSize];
				let batch = 0;

				while (true) {
					const raw =
						perlin2(x * 0.003, z * 0.003) * 1.0 +
						perlin2(x * 0.012, z * 0.012) * 0.3 +
						perlin2(x * 0.04,  z * 0.04)  * 0.08;
					const shifted = raw + 1.4;
					const sharp = Math.pow(shifted / 2.8, 6) * 2.8;
					const h = sharp * 500;
					if (h > peakY) {
						peakY = h; peakX = x; peakZ = z;
						document.getElementById('peakDisplay').textContent =
							`Peak: ${peakY.toFixed(0)}  at (${peakX.toFixed(0)}, ${peakY.toFixed(0)}, ${peakZ.toFixed(0)})`;
						refinePeak();
					}

					x += dx[dir];
					z += dz[dir];
					stepCount++;
					if (stepCount === step) {
						stepCount = 0;
						dir = (dir + 1) % 4;
						turns++;
						if (turns % 2 === 0) step++;
					}

					if (++batch >= 50000) {
						if (Math.max(Math.abs(x),Math.abs(z)) > maxx) {
							maxx = Math.max(Math.abs(x),Math.abs(z));
							document.getElementById('max').textContent = `max: ${maxx}`;
						}
						batch = 0;
						await new Promise(r => setTimeout(r, 0));
					}
				}
			}


			async function refinePeak() {
				const step = 1;
				const margin = 200;
				const refineX = peakX, refineZ = peakZ;
				for (let wx = refineX - margin; wx <= refineX + margin; wx += step) {
					for (let wz = refineZ - margin; wz <= refineZ + margin; wz += step) {
						const raw =
							perlin2(wx * 0.003, wz * 0.003) * 1.0 +
							perlin2(wx * 0.012, wz * 0.012) * 0.3 +
							perlin2(wx * 0.04,  wz * 0.04)  * 0.08;
						const shifted = raw + 1.4;
						const sharp = Math.pow(shifted / 2.8, 6) * 2.8;
						const h = sharp * 500;
						if (h > peakY) {
							peakY = h; peakX = wx; peakZ = wz;
							document.getElementById('peakDisplay').textContent =
								`Peak: ${peakY.toFixed(0)}  at (${peakX.toFixed(0)}, ${peakY.toFixed(0)}, ${peakZ.toFixed(0)})`;
						}
					}
					await new Promise(r => setTimeout(r, 0));
				}
			}

							stance = name;

							if (socket.readyState === 1) {
								const stanceName = name === 'none' ? 'walking' : name.replace('is', '').toLowerCase();
								        socket.send(JSON.stringify({
								            type: 'chat',
								            name: 'server:',
								            color: '#aaaaaa',
								            msg: mname + ' is ' + stanceName + '.'
								        }));
								    }
						}
					});
					grid.appendChild(btn);
				});
			}
			window.openStance = openStance;
			function fire() {
				fireTime = 5;
			}
			let boxes = []
			const fgeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
			function drawFlames() {
				const fmat = new THREE.MeshStandardMaterial({
					color: new THREE.Color(1, Math.random() * 0.6, 0),
					roughness: 0.9,
					metalness: 0.1
				});
				const mesh = new THREE.Mesh(fgeo, fmat);
				mesh.position.copy(headpos);
				const vel3 = new THREE.Vector3(
					(Math.random() - 0.5) * 0.3,
					(Math.random() - 0.5) * 0.3,
					(Math.random() - 0.5) * 0.3
				).applyQuaternion(torso.quaternion)
					.add(forw.clone().multiplyScalar(vel.length() * -0.9 + 2));
				mesh.userData.velocity = vel3;
				mesh.userData.lifetime = 1;
				mesh.rotation.x += Math.random();
				mesh.rotation.y += Math.random();
				mesh.rotation.z += Math.random();
				boxes.push(mesh);
				scene.add(mesh);
				if (socket.readyState === 1) {
			        socket.send(JSON.stringify({
			            type: 'fire',
			            pos: { x: headpos.x, y: headpos.y, z: headpos.z },
			            vel: { x: vel3.x, y: vel3.y, z: vel3.z }
			        }));
			    }
			}

			let angl = 0
			let angly = 0.3
			let speed = 16
			let timer = 0
			const paxis = new THREE.Vector3(1, 0, 0);
			const yaxis = new THREE.Vector3(0, 1, 0);
			const raxis = new THREE.Vector3(0, 0, 1);
			const forw = new THREE.Vector3();
			const gravity = new THREE.Vector3(0, -0.004, 0); 
			const up = new THREE.Vector3(0, 1, 0);  
			const slow = 0.92;
			const pow = 0.08;
			const clock = new THREE.Clock();
			const headpos = new THREE.Vector3();
			let wingExposure = 1
			let wingLift = 0
			let rollAmt = 0
			let pitchAmt = 0
			const maxLift = 0.006
			const wingDrag = 0.85
			let fall = 1;
			let flapPhase = 0;
			let flapSpeed = 0.08;
			let seed = 0
			const raycaster = new THREE.Raycaster();
			const downDir = new THREE.Vector3(0, -1, 0);
			let groundMeshes = []; 
			let groundY = 0;
			const minrot = 3.6
			const maxrot = 4.6
			let plus = 0
			const surfaceNormal = new THREE.Vector3(0, 1, 0); 

			let stanceL = ['isRunning', 'isSitting', 'isSleeping', 'isDefensive', 'none']
			let stance = 'none'
			let isFlying = true
			let peakY = -Infinity;
			let peakX = 0, peakZ = 0;
			let paused = false;
			const playerData = {};
			let fireTime = 0;


			function anim() {
				requestAnimationFrame(anim);
				updateChunks();

				timer++;
				grassMaterial.uniforms.time.value += 0.016;
				if (fireTime >= 1) {
					drawFlames()
				}
				for (let i = boxes.length - 1; i >= 0; i--) {
					const box = boxes[i];
					box.position.addScaledVector(box.userData.velocity, 1);
					box.userData.velocity.y -= 0.01;
					box.userData.lifetime -= 0.01;
					const t = box.userData.lifetime; 
					box.scale.setScalar(Math.max(t, 0) * 3);
					box.rotation.x += 0.01;
					box.rotation.y += 0.01;
					box.rotation.z += 0.01;
					if (box.userData.lifetime <= 0) {
						scene.remove(box);
						box.geometry.dispose();
						box.material.dispose();
						boxes.splice(i, 1); 
					}
				}

			if (!gameStarted) {
				render.render(scene, cam);
				return;
			}
				if (torso) {
					head.getWorldPosition(headpos)
					raycaster.set(
						new THREE.Vector3(torso.position.x, torso.position.y + 800, torso.position.z),
						downDir
					);
					const hits = raycaster.intersectObjects(groundMeshes, false);
					if (hits.length > 0) {
						groundY = hits[0].point.y;

						const hitNormal = hits[0].face.normal.clone()
							.transformDirection(hits[0].object.matrixWorld)
							.normalize();

						surfaceNormal.lerp(hitNormal, 0.15).normalize();
					}


					const sitOffset = stance === stanceL[1] ? 0.7 : 0;
					const effectiveGroundY = groundY + sitOffset;
					const onGround = torso.position.y <= groundY + sitOffset + 0.1;
					let rolling = 0;
					let pitching = 0;
					let yawing = 0;
					if (!paused) {
						if (onGround && isFlying) {
							stance = 'none';
							isFlying = false;
						}
						if (isFlying) {
							head.rotation.x += (0 - head.rotation.x) * 0.20;
							head.rotation.y += (0 - head.rotation.y) * 0.20;
							head.rotation.z += (0 - head.rotation.z) * 0.20;
							tail1.rotation.x += (0 - tail1.rotation.x) * 0.20;
							tail1.rotation.y += (0 - tail1.rotation.y) * 0.20;
							tail1.rotation.z += (0 - tail1.rotation.z) * 0.20;
							tail2.rotation.x += (0 - tail2.rotation.x) * 0.20;
							tail2.rotation.y += (0 - tail2.rotation.y) * 0.20;
							tail2.rotation.z += (0 - tail2.rotation.z) * 0.20;
							wing1.rotation.x += (0 - wing1.rotation.x) * 0.20;
							wing2.rotation.x += (0 - wing2.rotation.x) * 0.20;
							stance = 'none'
						}
						if (keys['d']) { 
							if (!isFlying) {
								if (stance == stanceL[0]) torso.rotateOnAxis(yaxis, -0.02);
								if (stance == stanceL[1]) torso.rotateOnAxis(yaxis, -0.005);
								if (stance == stanceL[2]) torso.rotateOnAxis(yaxis, 0);
								if (stance == stanceL[3]) torso.rotateOnAxis(yaxis, -0.01);
								if (stance == stanceL[4]) torso.rotateOnAxis(yaxis, -0.03);
								yawing = -1
							} else {
								torso.rotateOnAxis(raxis,  0.04); 
								rolling =   1; 
							}
						}
						if (keys['a']) { 
							if (!isFlying) {
								if (stance == stanceL[0]) torso.rotateOnAxis(yaxis, 0.02);
								if (stance == stanceL[1]) torso.rotateOnAxis(yaxis, 0.005);
								if (stance == stanceL[2]) torso.rotateOnAxis(yaxis, 0);
								if (stance == stanceL[3]) torso.rotateOnAxis(yaxis, 0.01);
								if (stance == stanceL[4]) torso.rotateOnAxis(yaxis, 0.03);
								yawing = 1
							} else {
								torso.rotateOnAxis(raxis,  -0.04); 
								rolling =   -1; 
							}
						}
						if (keys['s']) { 
							if (isFlying) {
								torso.rotateOnAxis(paxis, -0.02 + (wing2.rotation.y - minrot - 0.3) * 0.01); 
								vel.y -= 0.06;
								pitching = -1; 
							} else {
								if (stance == stanceL[0]) vel.addScaledVector(forw, -0.02);
								if (stance == stanceL[1]) vel.addScaledVector(forw, 0.00);
								if (stance == stanceL[2]) vel.addScaledVector(forw, 0.00);
								if (stance == stanceL[3]) vel.addScaledVector(forw, -0.002);
								if (stance == stanceL[4]) vel.addScaledVector(forw, -0.01);
							}
						}
						if (keys['w']) { 
							if (isFlying) {
								torso.rotateOnAxis(paxis,  0.02 + (wing2.rotation.y - minrot - 0.3) * -0.01); 
								vel.y += 0.06;
								pitching =  1; 
							} else {
								if (stance == stanceL[0]) vel.addScaledVector(forw, 0.04);
								if (stance == stanceL[1]) vel.addScaledVector(forw, 0.00);
								if (stance == stanceL[2]) vel.addScaledVector(forw, 0.00);
								if (stance == stanceL[3]) vel.addScaledVector(forw, 0.002);
								if (stance == stanceL[4]) vel.addScaledVector(forw, 0.01);
							}
						}
						if (keys[' ']) {
							if (!isFlying) {
								isFlying = true;
								if (onGround) {
									vel.addScaledVector(up, 1);
									vel.addScaledVector(forw, 0.4);
								}
							} 
						}
						if (keys['l']) {
							if (fireTime == 0) {
								if (isFlying) fire();
							}
						}
						if (fireTime > 0) fireTime--;

						if (keys['j'] && !keys['k']) {
							plus += (0.5 - plus) * 0.1;
							if (plus > 0.49) plus = 0.5;
						}
						else if (keys['k']  && !keys['j']) {
							plus += (-0.2 - plus) * 0.04;
							if (plus < -0.19) plus = -0.2;
						}
						else {
							plus *= 0.85; 
							if (plus > -0.01 && plus < 0.01) plus = 0;
						}
						torso.getWorldDirection(forw);

						const wingFactor = THREE.MathUtils.clamp(
							(wing2.rotation.y - minrot) / (maxrot - minrot), 0, 1
						);
						const dragonUp = new THREE.Vector3(0, 1, 0).applyQuaternion(torso.quaternion);
						const uprightness = THREE.MathUtils.clamp(dragonUp.dot(up), 0, 1);
						const lift = uprightness * (1 - wingFactor);

						vel.y -= 0.01 * (1 - lift);

						if (isFlying) vel.addScaledVector(forw, 0.02 + (plus * 0.06));
						vel.multiplyScalar(0.96);
						let speedCap = THREE.MathUtils.lerp(3.0, 0.5, wingFactor);

						vel.clampLength(0, speedCap);

						torso.position.add(vel);
						if (torso.position.y <= groundY) {
							torso.position.y = effectiveGroundY
							vel.y = 0;
							isFlying = false;
							if (!(keys['w'] || keys['s'])) {
								vel.x *= 0.8;
								vel.z *= 0.8;
							}
						}

						if (torso.position.y < effectiveGroundY) {
							torso.position.y = effectiveGroundY
							stance = 'none';
							if (!(keys['w'] || keys['s'])) vel.set(vel.x * 0.8, vel.y * 0.8, vel.z * 0.8);
						}
						if (onGround) {
							land(stance);
						} else {
							seed = Math.sqrt(vel.x**2 + vel.y**2 + vel.z**2);
						}
					}

					document.getElementById('coords').textContent =`X: ${torso.position.x.toFixed(0)}  Y: ${torso.position.y.toFixed(0)}  Z: ${torso.position.z.toFixed(0)}`;
					if (socket.readyState === 1 && myId && torso && gameStarted) {
						const q = torso.quaternion;
						socket.send(JSON.stringify({
							type: 'move',
							worldSeed: worldSeed,
							color: mcolor,
							name: mname,
							pos:  { x: torso.position.x, y: torso.position.y, z: torso.position.z },
							quat: { x: q.x, y: q.y, z: q.z, w: q.w },
							vel:  { x: vel.x, y: vel.y, z: vel.z },
							seed: seed,
							parts: {
								head:  { rx: head.rotation.x,  ry: head.rotation.y,  rz: head.rotation.z  },
								wing1: { rx: wing1.rotation.x, ry: wing1.rotation.y, rz: wing1.rotation.z },
								wing2: { rx: wing2.rotation.x, ry: wing2.rotation.y, rz: wing2.rotation.z },
								tail1: { rx: tail1.rotation.x, ry: tail1.rotation.y, rz: tail1.rotation.z },
								tail2: { rx: tail2.rotation.x, ry: tail2.rotation.y, rz: tail2.rotation.z },
							}
						}));
					}

					const camB = new THREE.Vector3(0, 0, 1).applyQuaternion(torso.quaternion);
					const camU = new THREE.Vector3(0, 1, 0).applyQuaternion(torso.quaternion);
					const camt = headpos.clone()
						.addScaledVector(camB, -7)
						.addScaledVector(camU, 3);
					cam.position.lerp(camt, 0.1);
					cam.up.lerp(camU, 0.1);
					cam.lookAt(headpos);
					if (isFlying) {
						const targetFlapSpeed = 0.05 + seed * 0.07 + plus * 0.05;
						flapSpeed += (targetFlapSpeed - flapSpeed) * 0.04;
						flapPhase += flapSpeed;

						const rawTargetY2 = (seed * 2) + Math.PI + plus;
						const rawTargetY1 = (-seed * 2) - Math.PI - plus;
						const targetY2 = THREE.MathUtils.clamp(rawTargetY2, minrot, maxrot);
						const targetY1 = THREE.MathUtils.clamp(rawTargetY1, -maxrot, -minrot);
						wing2.rotation.y += (targetY2 - wing2.rotation.y) * 0.07;
						wing1.rotation.y += (targetY1 - wing1.rotation.y) * 0.07;

						const flapAmp = Math.max(0, (0.55 - seed + plus * 0.25)) * 0.9;
						const flapTarget1 =  Math.sin(flapPhase) * flapAmp;
						const flapTarget2 = -Math.sin(flapPhase) * flapAmp;
						wing1.rotation.z += (flapTarget1 - wing1.rotation.z) * 0.12;
						wing2.rotation.z += (flapTarget2 - wing2.rotation.z) * 0.12;
					}

				}
				sky.position.copy(cam.position);
				cam.updateMatrixWorld();
				const fovFactor = 2 * Math.tan(THREE.MathUtils.degToRad(fov / 2));
				const desiredPixels = 22;
				for (const id of Object.keys(otherPlayers)) {
					if (!playerData[id]) removePlayer(id);
				}
				for (const id in playerData) {
					if (!torso || !gameStarted) break;

					const d = playerData[id];   
					const p_exists = otherPlayers[id];

					if (!p_exists) {
						otherPlayers[id] = makePlayerMesh(0, 0, 0, d.color ?? '#000000', d.name ?? 'derg');
						addChatMessage('server:', d.name + ' has joined!', '#888888');
					}

					const p = otherPlayers[id];  

					p.mesh.position.set(d.pos.x, d.pos.y, d.pos.z);
					p.mesh.quaternion.set(d.quat.x, d.quat.y, d.quat.z, d.quat.w);
					p.indicator.position.set(d.pos.x, d.pos.y + 2, d.pos.z);
					p.nameLabel.position.set(d.pos.x, d.pos.y + 5, d.pos.z)

					const labelDist = cam.position.distanceTo(p.nameLabel.position);
					const labelSize = labelDist * fovFactor * 0.05;
					p.nameLabel.scale.set(labelSize * 4, labelSize, 1);
					if (d.parts) {
						const t = d.parts;
						if (p.cHead)  p.cHead.rotation.set(t.head.rx,   t.head.ry,   t.head.rz);
						if (p.cWing1) p.cWing1.rotation.set(t.wing1.rx, t.wing1.ry,  t.wing1.rz);
						if (p.cWing2) p.cWing2.rotation.set(t.wing2.rx, t.wing2.ry,  t.wing2.rz);
						if (p.cTail1) p.cTail1.rotation.set(t.tail1.rx, t.tail1.ry,  t.tail1.rz);
						if (p.cTail2) p.cTail2.rotation.set(t.tail2.rx, t.tail2.ry,  t.tail2.rz);
					}

					const diste = cam.position.distanceTo(p.indicator.position);
					p.indicator.scale.setScalar(fovFactor * diste * desiredPixels / window.innerHeight);
					const worldDown = new THREE.Vector3(0, -1, 0);
					worldDown.transformDirection(cam.matrixWorldInverse);
					p.indicator.material.rotation = Math.atan2(worldDown.x, worldDown.y);
				}

				render.render(scene, cam)

			}
			anim();
		</script>
	</body>
</html>
