			function createNoise(seed) {
			    const p = new Uint8Array(512);
			    const permBase = new Uint8Array(256);
			    for (let i = 0; i < 256; i++) permBase[i] = i;
			    let s = seed % 65536 || 1;
			    for (let i = 255; i > 0; i--) {
			        s = (s * 16807) % 2147483647;
			        const j = s % (i + 1);
			        [permBase[i], permBase[j]] = [permBase[j], permBase[i]];
			    }
			    for (let i = 0; i < 512; i++) p[i] = permBase[i & 255];
			
			    function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
			    function lerp(a, b, t) { return a + t * (b - a); }
			    function grad(h, x, y) {
			        h &= 3;
			        const u = h < 2 ? x : y;
			        const v = h < 2 ? y : x;
			        return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
			    }
			    return function perlin2(x, y) {
			        const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
			        x -= Math.floor(x); y -= Math.floor(y);
			        const u = fade(x), v = fade(y);
			        const a = p[X] + Y, b = p[X + 1] + Y;
			        return lerp(
			            lerp(grad(p[a],   x,   y), grad(p[b],   x-1, y),   u),
			            lerp(grad(p[a+1], x,   y-1), grad(p[b+1], x-1, y-1), u), v
			        );
			    };
			}

						// only center it, DON'T scale here
						const box = new THREE.Box3().setFromObject(part);
						const center = new THREE.Vector3();
						box.getCenter(center);
						part.position.sub(center);
						resolve(part);
					});
				});
			}

			const WORLD_SEED = 1;
			const perlin2 = createNoise(WORLD_SEED);
			const CHUNK_SIZE = 1000;
			const CHUNK_SEGS = 50;
			const VIEW_DIST  = 1; 
			const chunks = {};
			
			function chunkKey(cx, cz) { return `${cx},${cz}`; }
			
			function makeChunk(cx, cz) {
			    const geo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, CHUNK_SEGS, CHUNK_SEGS);
			    geo.rotateX(-Math.PI / 2);
			    const pos = geo.attributes.position;
			
			    for (let i = 0; i < pos.count; i++) {
			        const wx = pos.getX(i) + cx * CHUNK_SIZE; // world x
			        const wz = pos.getZ(i) + cz * CHUNK_SIZE; // world z
			
					const raw =
					    perlin2(wx * 0.0008, wz * 0.0008) * 1.0 +
					    perlin2(wx * 0.003,  wz * 0.003)  * 0.3 +
					    perlin2(wx * 0.01,   wz * 0.01)   * 0.08;
					
					// shift raw up so it's always positive (range was ~-1.4 to 1.4, now 0 to 2.8)
					const shifted = raw + 1.4;
					
					// sharpen peaks without creating hard cliffs
					const sharp = Math.pow(shifted / 2.8, 2.0) * 2.8;
					
					const h = sharp * 150;

			
			        pos.setY(i, h);
			    }
			    pos.needsUpdate = true;
			    geo.computeVertexNormals();
				const normals = geo.attributes.normal;
				const colors  = new Float32Array(pos.count * 3);
				
				for (let i = 0; i < pos.count; i++) {
				    const ny = normals.getY(i);
				
				    const c = THREE.MathUtils.clamp(ny, 0.3, 1.0);
				    colors[i * 3]     = c;  // R
				    colors[i * 3 + 1] = c;  // G
				    colors[i * 3 + 2] = c;  // B
				}
				geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
				
				const mat = new THREE.MeshStandardMaterial({
				    vertexColors: true,
				    flatShading: false
				});
			
			    const mesh = new THREE.Mesh(geo, mat);
			    mesh.position.set(cx * CHUNK_SIZE, 0, cz * CHUNK_SIZE);
			    scene.add(mesh);
			    groundMeshes.push(mesh);
			    return mesh;
			}
			
			function updateChunks() {
			    if (!torso) return;
			
			    const cx = Math.round(torso.position.x / CHUNK_SIZE);
			    const cz = Math.round(torso.position.z / CHUNK_SIZE);
			
			    for (let dx = -VIEW_DIST; dx <= VIEW_DIST; dx++) {
			        for (let dz = -VIEW_DIST; dz <= VIEW_DIST; dz++) {
			            const key = chunkKey(cx + dx, cz + dz);
			            if (!chunks[key]) {
			                chunks[key] = makeChunk(cx + dx, cz + dz);
			            }
			        }
			    }
			
			    for (const key in chunks) {
			        const [kcx, kcz] = key.split(',').map(Number);
			        if (Math.abs(kcx - cx) > VIEW_DIST + 1 || Math.abs(kcz - cz) > VIEW_DIST + 1) {
			            scene.remove(chunks[key]);
			            groundMeshes.splice(groundMeshes.indexOf(chunks[key]), 1);
			            chunks[key].geometry.dispose();
			            delete chunks[key];
			        }
			    }
			}

			document.body.appendChild(render.domElement);

			function land() {
				seed = seed / 1.1;
				vel.multiplyScalar(0.9);

				// get dragon's actual world-space forward
				const currentForward = new THREE.Vector3(0, 0, 1).applyQuaternion(torso.quaternion);

				currentForward.addScaledVector(surfaceNormal, -currentForward.dot(surfaceNormal));

				if (currentForward.lengthSq() < 0.0001) {
					currentForward.set(0, 0, 1);
					currentForward.addScaledVector(surfaceNormal, -currentForward.dot(surfaceNormal));
				}
				currentForward.normalize();

				const right = new THREE.Vector3().crossVectors(surfaceNormal, currentForward).normalize();
				const fwd   = new THREE.Vector3().crossVectors(right, surfaceNormal).normalize();

				const targetQuat = new THREE.Quaternion().setFromRotationMatrix(
					new THREE.Matrix4().makeBasis(right, surfaceNormal, fwd)
				);

				torso.quaternion.slerp(targetQuat, 0.1);

				wing1.rotation.y += ( Math.PI / 4 - wing1.rotation.y - Math.PI * 2) * 0.1;
				wing2.rotation.y += (-Math.PI / 4 - wing2.rotation.y + Math.PI * 2) * 0.1;
				wing1.rotation.z += (0 - wing1.rotation.z) * 0.1;
				wing2.rotation.z += (0 - wing2.rotation.z) * 0.1;
			}





			let angl = 0
			let angly = 0.3
			let speed = 16
			let timer = 0

			const paxis = new THREE.Vector3(1, 0, 0);
			const yaxis = new THREE.Vector3(0, 1, 0);
			const raxis = new THREE.Vector3(0, 0, 1);
			const forw = new THREE.Vector3();
			const gravity = new THREE.Vector3(0, -0.004, 0); 
			const up = new THREE.Vector3(0, 1, 0);  
			const slow = 0.92;
			const pow = 0.08;
			const clock = new THREE.Clock();
			const headpos = new THREE.Vector3();
			let wingExposure = 1
			let wingLift = 0
			let rollAmt = 0
			let pitchAmt = 0
			const maxLift = 0.006
			const wingDrag = 0.85
			let seed = 0
			const raycaster = new THREE.Raycaster();
			const downDir = new THREE.Vector3(0, -1, 0);
			let groundMeshes = []; 
			let groundY = 0;
			const minrot = 3.6
			const maxrot = 4.6
			let plus = 0
			const surfaceNormal = new THREE.Vector3(0, 1, 0); 
			let isFlying = true;



			function anim() {
				requestAnimationFrame(anim);
				updateChunks();
				timer++;


				//if (keys['ArrowRight']) angl -= 0.04;
				//if (keys['ArrowLeft']) angl += 0.04;
				//if (keys['ArrowUp']) angly = Math.min(angly + 0.04, Math.PI / 2 - 0.02);
				//if (keys['ArrowDown']) angly = Math.max(angly - 0.04, -Math.PI / 2 + 0.02);
				//if (keys['q']) head.rotation.y += 0.02;
				//if (keys['e']) head.rotation.y -= 0.02;
				if (torso) {
					raycaster.set(
						new THREE.Vector3(torso.position.x, torso.position.y + 600, torso.position.z),
						downDir
					);
					const hits = raycaster.intersectObjects(groundMeshes, false);
					if (hits.length > 0) {
						groundY = hits[0].point.y;

						const hitNormal = hits[0].face.normal.clone()
							.transformDirection(hits[0].object.matrixWorld)
							.normalize();

						surfaceNormal.lerp(hitNormal, 0.15).normalize();
					}


					const onGround = torso.position.y <= groundY + 0.1;
					// --- ROTATION ---
					let rolling = 0;
					let pitching = 0;
					let yawing = 0;

					if (keys['d']) { 
						if (onGround) {
							torso.rotateOnAxis(yaxis, -0.015);
							yawing = -1
						} else {
							torso.rotateOnAxis(raxis,  0.04); 
							rolling =   1; 
						}
					}
					if (keys['a']) { 
						if (onGround) {
							torso.rotateOnAxis(yaxis, 0.015);
							yawing = 1
						} else {
							torso.rotateOnAxis(raxis,  -0.04); 
							rolling =   -1; 
						}
					}
					if (keys['s']) { 
						if (!onGround) {
							torso.rotateOnAxis(paxis, -0.02 + (wing2.rotation.y - minrot - 0.3) * 0.01); 
							pitching = -1; 
						} else {
							vel.addScaledVector(forw, -0.01);
						}
					}
					if (keys['w']) { 
						if (!onGround) {
							torso.rotateOnAxis(paxis,  0.02 + (wing2.rotation.y - minrot - 0.3) * -0.01); 
							pitching =  1; 
						} else {
							vel.addScaledVector(forw, 0.01);
						}
					}
					if (keys[' ']) {
						if (onGround && !isFlying) {
							isFlying = true;
							vel.addScaledVector(up, 1);
							vel.addScaledVector(forw, 0.4);
						} 
					}

					if (keys['j'] && !keys['k']) {
						plus += (0.5 - plus) * 0.1;
						if (plus > 0.49) plus = 0.5;
					}
					else if (keys['k']  && !keys['j']) {
						plus += (-0.5 - plus) * 0.1;
						if (plus < -0.49) plus = -0.5;
					}
					else {
						plus *= 0.85; 
						if (plus > -0.01 && plus < 0.01) plus = 0;
					}
					// --- PHYSICS ---
					torso.getWorldDirection(forw);

					const wingFactor = THREE.MathUtils.clamp(
						(wing2.rotation.y - minrot) / (maxrot - minrot), 0, 1
					);
					const dragonUp = new THREE.Vector3(0, 1, 0).applyQuaternion(torso.quaternion);
					const uprightness = THREE.MathUtils.clamp(dragonUp.dot(up), 0, 1);
					const lift = uprightness * (1 - wingFactor);

					vel.y -= 0.01 * (1 - lift);
					if (isFlying) vel.addScaledVector(forw, 0.02 + (plus * 0.007));
					vel.multiplyScalar(0.96);


					const speedCap = THREE.MathUtils.lerp(3.0, 0.5, wingFactor);
					vel.clampLength(0, speedCap);

					torso.position.add(vel);

					if (torso.position.y < groundY) {
						torso.position.y = groundY;
						isFlying = false; 
						if (!(keys['w'] || keys['s'])) vel.set(vel.x * 0.8, vel.y * 0.8, vel.z * 0.8);
					}
					if (onGround) {
						land();
					} else {
						seed = Math.sqrt(vel.x**2 + vel.y**2 + vel.z**2);
					}




					head.getWorldPosition(headpos)
					// send position to server every frame
					if (socket.readyState === 1 && myId && torso) {
					    const q = torso.quaternion;
					    socket.send(JSON.stringify({
					        type: 'move',
					        pos:  { x: torso.position.x, y: torso.position.y, z: torso.position.z },
					        quat: { x: q.x, y: q.y, z: q.z, w: q.w },
					        vel:  { x: vel.x, y: vel.y, z: vel.z },
					        wing: wing2.rotation.y,
					        seed: seed
					    }));
					}



					const camB = new THREE.Vector3(0, 0, 1).applyQuaternion(torso.quaternion);
					const camU = new THREE.Vector3(0, 1, 0).applyQuaternion(torso.quaternion);
					const camt = headpos.clone()
						.addScaledVector(camB, -7)
						.addScaledVector(camU, 3);
					cam.position.lerp(camt, 0.1);
					cam.up.lerp(camU, 0.1);
					cam.lookAt(headpos);
					//--- ANIM ---
					if (!onGround) {
						wing2.rotation.y = Math.min(( seed * 2) + Math.PI + plus, 4.6);
						wing1.rotation.y = Math.max((-seed * 2) - Math.PI - plus, -4.6);
						wing1.rotation.z = ( Math.sin(timer / 13) / 2) * (0.6 - seed) * 2
						wing2.rotation.z = (-Math.sin(timer / 13) / 2) * (0.6 - seed) * 2
					}
				}
				sky.position.copy(cam.position);
				render.render(scene, cam)

			}
			anim();
