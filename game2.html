			function createNoise(seed) {
				const p = new Uint8Array(512);
				const permBase = new Uint8Array(256);
				for (let i = 0; i < 256; i++) permBase[i] = i;
				let s = seed % 65536 || 1;
				for (let i = 255; i > 0; i--) {
					s = (s * 16807) % 2147483647;
					const j = s % (i + 1);
					[permBase[i], permBase[j]] = [permBase[j], permBase[i]];
				}
				for (let i = 0; i < 512; i++) p[i] = permBase[i & 255];

				function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
				function lerp(a, b, t) { return a + t * (b - a); }
				function grad(h, x, y) {
					h &= 3;
					const u = h < 2 ? x : y;
					const v = h < 2 ? y : x;
					return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
				}
				return function perlin2(x, y) {
					const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
					x -= Math.floor(x); y -= Math.floor(y);
					const u = fade(x), v = fade(y);
					const a = p[X] + Y, b = p[X + 1] + Y;
					return lerp(
						lerp(grad(p[a],   x,   y), grad(p[b],   x-1, y),   u),
						lerp(grad(p[a+1], x,   y-1), grad(p[b+1], x-1, y-1), u), v
					);
				};
			}

			let WORLD_SEED = 1;

			let gameStarted = false;
			const CHUNK_SIZE = 100;
			const CHUNK_SEGS = 50;
			let VIEW_DIST  = 8; 
			const chunks = {};
			const slider = document.getElementById("renderDist")
			slider.addEventListener('input', () => {
				VIEW_DIST = Number(slider.value);
			});

			function chunkKey(cx, cz) { return `${cx},${cz}`; }

			function makeChunk(cx, cz) {
				const geo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, CHUNK_SEGS, CHUNK_SEGS);
				geo.rotateX(-Math.PI / 2);
				const pos = geo.attributes.position;

				for (let i = 0; i < pos.count; i++) {
					const wx = pos.getX(i) + cx * CHUNK_SIZE; // world x
					const wz = pos.getZ(i) + cz * CHUNK_SIZE; // world z

					const raw =
						perlin2(wx * 0.003, wz * 0.003) * 1.0 +
						perlin2(wx * 0.012, wz * 0.012) * 0.3 +
						perlin2(wx * 0.04,  wz * 0.04)  * 0.08;

					// shift raw up so it's always positive (range was ~-1.4 to 1.4, now 0 to 2.8)
					const shifted = raw + 1.4;

					// sharpen peaks without creating hard cliffs
					const sharp = Math.pow(shifted / 2.8, 6) * 2.8;

					const h = sharp * 500;


					pos.setY(i, h);
				}
				pos.needsUpdate = true;
				geo.computeVertexNormals();
				const normals = geo.attributes.normal;
				const colors  = new Float32Array(pos.count * 3);

				for (let i = 0; i < pos.count; i++) {
					const ny = normals.getY(i);

					const c = THREE.MathUtils.clamp((ny - 0.5) / 0.5, 0.15, 1.0);;
					colors[i * 3]     = c;  // R
					colors[i * 3 + 1] = c;  // G
					colors[i * 3 + 2] = c;  // B
				}
				geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

				const mat = new THREE.MeshStandardMaterial({
					vertexColors: true,
					flatShading: false
				});

				const mesh = new THREE.Mesh(geo, mat);
				mesh.position.set(cx * CHUNK_SIZE, 0, cz * CHUNK_SIZE);
				scene.add(mesh);
				groundMeshes.push(mesh);
				scanChunkForPeak(cx, cz)
				return mesh;
			}

			function updateChunks() {
				if (!torso || !gameStarted || !perlin2) return;

				const cx = Math.round(torso.position.x / CHUNK_SIZE);
				const cz = Math.round(torso.position.z / CHUNK_SIZE);

				for (let dx = -VIEW_DIST; dx <= VIEW_DIST; dx++) {
					for (let dz = -VIEW_DIST; dz <= VIEW_DIST; dz++) {
						const key = chunkKey(cx + dx, cz + dz);
						if (!chunks[key]) {
							chunks[key] = makeChunk(cx + dx, cz + dz);
						}
					}
				}

				for (const key in chunks) {
					const [kcx, kcz] = key.split(',').map(Number);
					if (Math.abs(kcx - cx) > VIEW_DIST + 1 || Math.abs(kcz - cz) > VIEW_DIST + 1) {
						scene.remove(chunks[key]);
						groundMeshes.splice(groundMeshes.indexOf(chunks[key]), 1);
						chunks[key].geometry.dispose();
						delete chunks[key];
					}
				}
			}
			function scanChunkForPeak(cx, cz) {
				const step = 1; // finer scan per chunk
				for (let wx = cx * CHUNK_SIZE; wx <= (cx + 1) * CHUNK_SIZE; wx += step) {
					for (let wz = cz * CHUNK_SIZE; wz <= (cz + 1) * CHUNK_SIZE; wz += step) {
						const raw =
							perlin2(wx * 0.003, wz * 0.003) * 1.0 +
							perlin2(wx * 0.012, wz * 0.012) * 0.3 +
							perlin2(wx * 0.04,  wz * 0.04)  * 0.08;
						const shifted = raw + 1.4;
						const sharp = Math.pow(shifted / 2.8, 6) * 2.8;
						const h = sharp * 500;
						if (h > peakY) {
							peakY = h;
							peakX = wx;
							peakZ = wz;
							document.getElementById('peakDisplay').textContent =
								`Peak: ${peakY.toFixed(0)}  at (${peakX.toFixed(0)}, ${peakY.toFixed(0)}, ${peakZ.toFixed(0)})`;
						}
					}
				}
			}

			let peakSearchRadius = 0;
			const PEAK_SEARCH_STEP = 100;
			const PEAK_SEARCH_RING = 1200;
			let maxx = 0;
			async function findPeak() {
				document.getElementById('peakDisplay').textContent = `Peak: searching...`;
				let x = 0, z = 0;
				let step = 1, stepCount = 0, dir = 0, turns = 0;
				const STEP = 1; 
				const dx = [STEP, 0, -STEP, 0];
				const dz = [0, STEP, 0, -STEP];
				let batch = 0;

				while (true) {
					const raw =
						perlin2(x * 0.003, z * 0.003) * 1.0 +
						perlin2(x * 0.012, z * 0.012) * 0.3 +
						perlin2(x * 0.04,  z * 0.04)  * 0.08;
					const shifted = raw + 1.4;
					const sharp = Math.pow(shifted / 2.8, 6) * 2.8;
					const h = sharp * 500;
					if (h > peakY) {
						peakY = h; peakX = x; peakZ = z;
						document.getElementById('peakDisplay').textContent =
							`Peak: ${peakY.toFixed(0)}  at (${peakX.toFixed(0)}, ${peakY.toFixed(0)}, ${peakZ.toFixed(0)})`;
						refinePeak();
					}

					x += dx[dir];
					z += dz[dir];
					stepCount++;
					if (stepCount === step) {
						stepCount = 0;
						dir = (dir + 1) % 4;
						turns++;
						if (turns % 2 === 0) step++;
					}

					if (++batch >= 50000) {
						if (Math.max(Math.abs(x),Math.abs(z)) > maxx) {
							maxx = Math.max(Math.abs(x),Math.abs(z));
							document.getElementById('max').textContent = `max: ${maxx}`;
						}
						batch = 0;
						await new Promise(r => setTimeout(r, 0));
					}
				}
			}


			async function refinePeak() {
				const step = 1;
				const margin = 200;
				const refineX = peakX, refineZ = peakZ; // snapshot so it doesn't chase a moving target
				for (let wx = refineX - margin; wx <= refineX + margin; wx += step) {
					for (let wz = refineZ - margin; wz <= refineZ + margin; wz += step) {
						const raw =
							perlin2(wx * 0.003, wz * 0.003) * 1.0 +
							perlin2(wx * 0.012, wz * 0.012) * 0.3 +
							perlin2(wx * 0.04,  wz * 0.04)  * 0.08;
						const shifted = raw + 1.4;
						const sharp = Math.pow(shifted / 2.8, 6) * 2.8;
						const h = sharp * 500;
						if (h > peakY) {
							peakY = h; peakX = wx; peakZ = wz;
							document.getElementById('peakDisplay').textContent =
								`Peak: ${peakY.toFixed(0)}  at (${peakX.toFixed(0)}, ${peakY.toFixed(0)}, ${peakZ.toFixed(0)})`;
						}
					}
					await new Promise(r => setTimeout(r, 0));
				}
			}

			function makeIndicator() {
				const canvas = document.createElement('canvas');

				const ctx = canvas.getContext('2d');

				// Downward-pointing arrow
				ctx.fillStyle = '#00eeff';
				ctx.shadowColor = '#00eeff';
				ctx.shadowBlur = 10;
				ctx.beginPath();
				ctx.moveTo(32, 54);   // tip
				ctx.lineTo(10, 14);   // top-left

				ctx.closePath();
				ctx.fill();

			let sitTiltAngle = 0;
			function land(s) {
				seed = seed / 1.1;
				vel.multiplyScalar(0.9);

				// get dreg forward dir
				const currentForward = new THREE.Vector3(0, 0, 1).applyQuaternion(torso.quaternion);

				currentForward.addScaledVector(surfaceNormal, -currentForward.dot(surfaceNormal));

				if (currentForward.lengthSq() < 0.0001) {
					currentForward.set(0, 0, 1);
					currentForward.addScaledVector(surfaceNormal, -currentForward.dot(surfaceNormal));
				}
				currentForward.normalize();

				const right = new THREE.Vector3().crossVectors(surfaceNormal, currentForward).normalize();
				const fwd   = new THREE.Vector3().crossVectors(right, surfaceNormal).normalize();

				const targetQuat = new THREE.Quaternion().setFromRotationMatrix(
					new THREE.Matrix4().makeBasis(right, surfaceNormal, fwd)
				);

				let tiltTarget = 0;
				if (s === stanceL[1]) tiltTarget = -1;

				sitTiltAngle += (tiltTarget - sitTiltAngle) * 0.05;

				const tiltQuat = new THREE.Quaternion().setFromAxisAngle(
					new THREE.Vector3(1, 0, 0), sitTiltAngle
				);
				const finalQuat = targetQuat.clone().multiply(tiltQuat);
				torso.quaternion.slerp(finalQuat, 0.1);

				if (s == stanceL[0]) {//running
					wing1.rotation.y += ( Math.PI / 4 - wing1.rotation.y - Math.PI * 1.7) * 0.1;
					wing2.rotation.y += (-Math.PI / 4 - wing2.rotation.y + Math.PI * 1.7) * 0.1;
					wing1.rotation.z += (0 - wing1.rotation.z) * 0.1;
					wing2.rotation.z += (0 - wing2.rotation.z) * 0.1;
					head.rotation.x += (0 - head.rotation.x) * 0.1;
					head.rotation.y += (0 - head.rotation.y) * 0.1;
					head.rotation.z += (0 - head.rotation.z) * 0.1;
					tail1.rotation.y += (0 - tail1.rotation.y) * 0.1;
					tail2.rotation.y += (0 - tail2.rotation.y) * 0.1;
					tail1.rotation.x += (0 - tail1.rotation.x) * 0.1;
					tail2.rotation.x += (0 - tail2.rotation.x) * 0.1;
				}
				if (s == stanceL[1]) {//sitting
					tail1.rotation.x += (0.5 - tail1.rotation.x) * 0.1;
					tail2.rotation.x += (0.5 - tail2.rotation.x) * 0.1;
					tail1.rotation.y += (0 - tail1.rotation.y) * 0.1;
					tail2.rotation.y += (0 - tail2.rotation.y) * 0.1;
					wing1.rotation.y += ( Math.PI / 4 - wing1.rotation.y - Math.PI * 2) * 0.1;
					wing2.rotation.y += (-Math.PI / 4 - wing2.rotation.y + Math.PI * 2) * 0.1;
					wing1.rotation.z += (0.2 - wing1.rotation.z) * 0.1;
					wing2.rotation.z += (-0.2 - wing2.rotation.z) * 0.1;
					head.rotation.x += (-0.6 - head.rotation.x) * 0.1;
					head.rotation.y += (0 - head.rotation.y) * 0.1;
					head.rotation.z += (0 - head.rotation.z) * 0.1;
				} else {
					tail1.rotation.z += (0 - tail1.rotation.z) * 0.1;
					tail2.rotation.z += (0 - tail2.rotation.z) * 0.1;
				}
				if (s == stanceL[2]) {//sleeping
					head.rotation.z += (0 - head.rotation.z) * 0.05;
					tail1.rotation.y += (1.4 - tail1.rotation.y) * 0.05;
					tail2.rotation.y += (1.2 - tail2.rotation.y) * 0.05;
					head.rotation.y  += (-0.9 - head.rotation.y)  * 0.05;
					head.rotation.x += (0 - head.rotation.x)  * 0.1;
					wing1.rotation.y += (-Math.PI * 0.5 - wing1.rotation.y) * 0.1
					wing2.rotation.y += ( Math.PI * 0.5 - wing2.rotation.y) * 0.1;
					wing1.rotation.z += (-0.25 - wing1.rotation.z) * 0.1;
					wing2.rotation.z += (-0.25 - wing2.rotation.z) * 0.1;
					tail1.rotation.x += (0 - tail1.rotation.x) * 0.1;
					tail2.rotation.x += (0 - tail2.rotation.x) * 0.1;
				}
				if (s == stanceL[3]) {//defensive
					head.rotation.x += (Math.PI * (30 / 365) - head.rotation.x) * 0.1;
					tail1.rotation.y += (0 - tail1.rotation.y) * 0.1;
					tail2.rotation.y += (0 - tail2.rotation.y) * 0.1;
					head.rotation.z += (0 - head.rotation.z) * 0.1;
					head.rotation.y += (0 - head.rotation.y) * 0.1;
					wing1.rotation.y += (-Math.PI * 1.8 - wing1.rotation.y) * 0.1;
					wing2.rotation.y += ( Math.PI * 1.8 - wing2.rotation.y) * 0.1;
					wing1.rotation.z += (0 - wing1.rotation.z) * 0.1;
					wing2.rotation.z += (0 - wing2.rotation.z) * 0.1;
					tail1.rotation.x += (0 - tail1.rotation.x) * 0.1;
					tail2.rotation.x += (0 - tail2.rotation.x) * 0.1;
				}
				if (s == stanceL[4]) {//walking
					wing1.rotation.y += ( Math.PI / 4 - wing1.rotation.y - Math.PI * 2) * 0.1;
					wing2.rotation.y += (-Math.PI / 4 - wing2.rotation.y + Math.PI * 2) * 0.1;
					wing1.rotation.z += (0 - wing1.rotation.z) * 0.1;
					wing2.rotation.z += (0 - wing2.rotation.z) * 0.1;
					head.rotation.x += (0 - head.rotation.x) * 0.1;
					head.rotation.y += (0 - head.rotation.y) * 0.1;
					head.rotation.z += (0 - head.rotation.z) * 0.1;
					tail1.rotation.y += (0 - tail1.rotation.y) * 0.1;
					tail2.rotation.y += (0 - tail2.rotation.y) * 0.1;
					tail1.rotation.x += (0 - tail1.rotation.x) * 0.1;
					tail2.rotation.x += (0 - tail2.rotation.x) * 0.1;
				}
				if (isFlying) {
					head.rotation.x += (0 - head.rotation.x) * 0.05;
					head.rotation.y += (0 - head.rotation.y) * 0.05;
					head.rotation.z += (0 - head.rotation.z) * 0.05;
					tail1.rotation.x += (0 - tail1.rotation.x) * 0.05;
					tail1.rotation.y += (0 - tail1.rotation.y) * 0.05;
					tail1.rotation.z += (0 - tail1.rotation.z) * 0.05;
					tail2.rotation.x += (0 - tail2.rotation.x) * 0.05;
					tail2.rotation.y += (0 - tail2.rotation.y) * 0.05;
					tail2.rotation.z += (0 - tail2.rotation.z) * 0.05;
					wing1.rotation.x += (0 - wing1.rotation.x) * 0.05;
					wing2.rotation.x += (0 - wing2.rotation.x) * 0.05;
				}
			}
			document.getElementById('playBtn').addEventListener('click', () => {
				WORLD_SEED = parseInt(document.getElementById('seedInput').value) || 1;
				perlin2 = createNoise(WORLD_SEED);
				document.getElementById('startScreen').style.display = 'none';
				document.getElementById('seedDisplay').textContent = 'Seed: ' + WORLD_SEED;
				gameStarted = true;
				findPeak();
			});



			function openStance() {
				const menu = document.getElementById('pauseMenu');
				menu.innerHTML = `
							<b style="font-size:16px; margin-bottom:8px;">— stances —</b>
							<p style="font-size:11px; margin-bottom:12px; opacity:0.6;">only active on ground</p>
							<div id="stanceGrid" style="
							display: grid;
							grid-template-columns: 1fr 1fr;
							gap: 8px;
							width: 260px;
							"></div>
							`;

				const grid = document.getElementById('stanceGrid');

				stanceL.forEach(name => {
					const btn = document.createElement('button');
					btn.textContent = name.replace('is', '').toLowerCase();
					btn.style.cssText = `
								padding: 10px 0;
								background: ${stance === name ? '#ffffff' : 'transparent'};
								color: ${stance === name ? '#000' : '#fff'};
								border: 1px solid #ffffff;
								cursor: pointer;
								font-family: monospace;
								font-size: 13px;
								`;
					btn.addEventListener('click', () => {
						stance = name;
						openStance();
					});
					grid.appendChild(btn);
				});
			}
			window.openStance = openStance;





			let angl = 0
			let angly = 0.3
			let speed = 16
			let timer = 0
			const paxis = new THREE.Vector3(1, 0, 0);
			const yaxis = new THREE.Vector3(0, 1, 0);
			const raxis = new THREE.Vector3(0, 0, 1);
			const forw = new THREE.Vector3();
			const gravity = new THREE.Vector3(0, -0.004, 0); 
			const up = new THREE.Vector3(0, 1, 0);  
			const slow = 0.92;
			const pow = 0.08;
			const clock = new THREE.Clock();
			const headpos = new THREE.Vector3();
			let wingExposure = 1
			let wingLift = 0
			let rollAmt = 0
			let pitchAmt = 0
			const maxLift = 0.006
			const wingDrag = 0.85
			let flapPhase = 0;
			let flapSpeed = 0.08;
			let seed = 0
			const raycaster = new THREE.Raycaster();
			const downDir = new THREE.Vector3(0, -1, 0);
			let groundMeshes = []; 
			let groundY = 0;
			const minrot = 3.6
			const maxrot = 4.6
			let plus = 0
			const surfaceNormal = new THREE.Vector3(0, 1, 0); 

			let stanceL = ['isRunning', 'isSitting', 'isSleeping', 'isDefensive', 'none']
			let stance = 'none' // can be flying if in air, sitting, running, walking, sleeping or none.
			// running would make it faster, and also add a forward backward movement, and also move the tail up and down to account for movement
			// sitting would prop the drag up so itll be basically sitting with its tail flat with the ground
			// sleeping would make it curl up and sleep
			// defensive will make it enter a defensive stance that it can also (hopefully soon) attack other dregs
			// all of these will only send the wing rot and other stuff to the server
			let isFlying = true
			let peakY = -Infinity;
			let peakX = 0, peakZ = 0;
			let paused = false;
			const playerData = {}





			function anim() {
				requestAnimationFrame(anim);
				updateChunks();

				timer++;


				//if (keys['ArrowRight']) angl -= 0.04;
				//if (keys['ArrowLeft']) angl += 0.04;
				//if (keys['ArrowUp']) angly = Math.min(angly + 0.04, Math.PI / 2 - 0.02);
				//if (keys['ArrowDown']) angly = Math.max(angly - 0.04, -Math.PI / 2 + 0.02);
				//if (keys['q']) head.rotation.y += 0.02;
				//if (keys['e']) head.rotation.y -= 0.02;
				if (torso) {
					raycaster.set(
						new THREE.Vector3(torso.position.x, torso.position.y + 800, torso.position.z),
						downDir
					);
					const hits = raycaster.intersectObjects(groundMeshes, false);
					if (hits.length > 0) {
						groundY = hits[0].point.y;

						const hitNormal = hits[0].face.normal.clone()
							.transformDirection(hits[0].object.matrixWorld)
							.normalize();

						surfaceNormal.lerp(hitNormal, 0.15).normalize();
					}


					const onGround = torso.position.y <= groundY + 0.1;
					// --- ROTATION ---
					let rolling = 0;
					let pitching = 0;
					let yawing = 0;
					if (!paused) {
						if (onGround && isFlying) {
							stance = 'none';
							isFlying = false;
						}
						if (keys['d']) { 
							if (onGround) {
								if (stance == stanceL[0]) torso.rotateOnAxis(yaxis, -0.02);
								if (stance == stanceL[1]) torso.rotateOnAxis(yaxis, -0.005);
								if (stance == stanceL[2]) torso.rotateOnAxis(yaxis, 0);
								if (stance == stanceL[3]) torso.rotateOnAxis(yaxis, -0.01);
								if (stance == stanceL[4]) torso.rotateOnAxis(yaxis, -0.03);
								yawing = -1
							} else {
								torso.rotateOnAxis(raxis,  0.04); 
								rolling =   1; 
							}
						}
						if (keys['a']) { 
							if (onGround) {
								if (stance == stanceL[0]) torso.rotateOnAxis(yaxis, 0.02);
								if (stance == stanceL[1]) torso.rotateOnAxis(yaxis, 0.005);
								if (stance == stanceL[2]) torso.rotateOnAxis(yaxis, 0);
								if (stance == stanceL[3]) torso.rotateOnAxis(yaxis, 0.01);
								if (stance == stanceL[4]) torso.rotateOnAxis(yaxis, 0.03);
								yawing = 1
							} else {
								torso.rotateOnAxis(raxis,  -0.04); 
								rolling =   -1; 
							}
						}
						if (keys['s']) { 
							if (!onGround) {
								torso.rotateOnAxis(paxis, -0.02 + (wing2.rotation.y - minrot - 0.3) * 0.01); 
								pitching = -1; 
							} else {
								if (stance == stanceL[0]) vel.addScaledVector(forw, -0.02);
								if (stance == stanceL[1]) vel.addScaledVector(forw, 0.00); // only 0.00 cos im too lazy to change
								if (stance == stanceL[2]) vel.addScaledVector(forw, 0.00);
								if (stance == stanceL[3]) vel.addScaledVector(forw, -0.002);
								if (stance == stanceL[4]) vel.addScaledVector(forw, -0.01);
							}
						}
						if (keys['w']) { 
							if (!onGround) {
								torso.rotateOnAxis(paxis,  0.02 + (wing2.rotation.y - minrot - 0.3) * -0.01); 
								pitching =  1; 
							} else {
								if (stance == stanceL[0]) vel.addScaledVector(forw, 0.02);
								if (stance == stanceL[1]) vel.addScaledVector(forw, 0.00);
								if (stance == stanceL[2]) vel.addScaledVector(forw, 0.00);
								if (stance == stanceL[3]) vel.addScaledVector(forw, 0.002);
								if (stance == stanceL[4]) vel.addScaledVector(forw, 0.01);
							}
						}
						if (keys[' ']) {
							if (onGround && !(isFlying)) {
								isFlying = true;
								vel.addScaledVector(up, 1);
								vel.addScaledVector(forw, 0.4);
							} 
						}
						if (keys['m']) {
							console.log(wing1.rotation.y);
							console.log(wing2.rotation.y);
							console.log(head.rotation.y);
						}

						if (keys['j'] && !keys['k']) {
							plus += (0.5 - plus) * 0.1;
							if (plus > 0.49) plus = 0.5;
						}
						else if (keys['k']  && !keys['j']) {
							plus += (-0.2 - plus) * 0.04;
							if (plus < -0.19) plus = -0.2;
						}
						else {
							plus *= 0.85; 
							if (plus > -0.01 && plus < 0.01) plus = 0;
						}
						// --- PHYSICS ---
						torso.getWorldDirection(forw);

						const wingFactor = THREE.MathUtils.clamp(
							(wing2.rotation.y - minrot) / (maxrot - minrot), 0, 1
						);
						const dragonUp = new THREE.Vector3(0, 1, 0).applyQuaternion(torso.quaternion);
						const uprightness = THREE.MathUtils.clamp(dragonUp.dot(up), 0, 1);
						const lift = uprightness * (1 - wingFactor);

						vel.y -= 0.01 * (1 - lift);
						if (isFlying) vel.addScaledVector(forw, 0.02 + (plus * 0.06));
						vel.multiplyScalar(0.96);
						let speedCap = THREE.MathUtils.lerp(3.0, 0.5, wingFactor);
						//if (keys['k'] && !keys['j']) speedCap = THREE.MathUtils.lerp(1.5, 0.25, wingFactor);
						//if (keys['j'] && !keys['k']) speedCap = THREE.MathUtils.lerp(6.0, 1, wingFactor);

						vel.clampLength(0, speedCap);

						torso.position.add(vel);
						if (torso.position.y <= groundY) {
							torso.position.y = groundY;
							vel.y = 0; // ← kill vertical on ground
							isFlying = false;
							if (!(keys['w'] || keys['s'])) {
								vel.x *= 0.8;
								vel.z *= 0.8;
							}
						}
						if (torso.position.y < groundY) {
							torso.position.y = groundY;
							stance = 'none'; 
							if (!(keys['w'] || keys['s'])) vel.set(vel.x * 0.8, vel.y * 0.8, vel.z * 0.8);
						}
						if (onGround) {
							land(stance);
						} else {
							seed = Math.sqrt(vel.x**2 + vel.y**2 + vel.z**2);
						}
					}




					head.getWorldPosition(headpos)
					document.getElementById('coords').textContent =`X: ${torso.position.x.toFixed(0)}  Y: ${torso.position.y.toFixed(0)}  Z: ${torso.position.z.toFixed(0)}`;
					// send position to server every frame
					if (socket.readyState === 1 && myId && torso && gameStarted) {
						const q = torso.quaternion;
						socket.send(JSON.stringify({
							type: 'move',
							worldSeed: WORLD_SEED,
							pos:  { x: torso.position.x, y: torso.position.y, z: torso.position.z },
							quat: { x: q.x, y: q.y, z: q.z, w: q.w },
							vel:  { x: vel.x, y: vel.y, z: vel.z },
							seed: seed,
							parts: {
								head:  { rx: head.rotation.x,  ry: head.rotation.y,  rz: head.rotation.z  },
								wing1: { rx: wing1.rotation.x, ry: wing1.rotation.y, rz: wing1.rotation.z },
								wing2: { rx: wing2.rotation.x, ry: wing2.rotation.y, rz: wing2.rotation.z },
								tail1: { rx: tail1.rotation.x, ry: tail1.rotation.y, rz: tail1.rotation.z },
								tail2: { rx: tail2.rotation.x, ry: tail2.rotation.y, rz: tail2.rotation.z },
							}
						}));
					}





					const camB = new THREE.Vector3(0, 0, 1).applyQuaternion(torso.quaternion);
					const camU = new THREE.Vector3(0, 1, 0).applyQuaternion(torso.quaternion);
					const camt = headpos.clone()
						.addScaledVector(camB, -7)
						.addScaledVector(camU, 3);
					cam.position.lerp(camt, 0.1);
					cam.up.lerp(camU, 0.1);
					cam.lookAt(headpos);
					//--- ANIM ---
					if (!onGround) {
						const targetFlapSpeed = 0.05 + seed * 0.07 + plus * 0.05;
						flapSpeed += (targetFlapSpeed - flapSpeed) * 0.04;
						flapPhase += flapSpeed;

						const targetY2 = Math.min((seed * 2) + Math.PI + plus, 4.6);
						const targetY1 = Math.max((-seed * 2) - Math.PI - plus, -4.6);
						wing2.rotation.y += (targetY2 - wing2.rotation.y) * 0.07;
						wing1.rotation.y += (targetY1 - wing1.rotation.y) * 0.07;

						const flapAmp = Math.max(0, (0.55 - seed + plus * 0.25)) * 0.9;
						const flapTarget1 =  Math.sin(flapPhase) * flapAmp;
						const flapTarget2 = -Math.sin(flapPhase) * flapAmp;
						wing1.rotation.z += (flapTarget1 - wing1.rotation.z) * 0.12;
						wing2.rotation.z += (flapTarget2 - wing2.rotation.z) * 0.12;
					}

				}
				sky.position.copy(cam.position);
				cam.updateMatrixWorld();
				const fovFactor = 2 * Math.tan(THREE.MathUtils.degToRad(fov / 2));
				const desiredPixels = 22;

				/*for (const id in otherPlayers) {
							const p = otherPlayers[id];
							const d = cam.position.distanceTo(p.indicator.position);
							p.indicator.scale.setScalar(fovFactor * d * desiredPixels / window.innerHeight);
							const worldDown = new THREE.Vector3(0, -1, 0);
							worldDown.transformDirection(cam.matrixWorldInverse);
							p.indicator.material.rotation = Math.atan2(worldDown.x, worldDown.y);
						}*/
				for (const id of Object.keys(otherPlayers)) {
					if (!playerData[id]) removePlayer(id);
				}
				for (const id in playerData) {
					if (!torso || !gameStarted) break;
					if (!otherPlayers[id]) {
						otherPlayers[id] = makePlayerMesh(0, 0, 0);
						const p = otherPlayers[id];
						console.log('parts found:', p.cHead, p.cWing1, p.cWing2, p.cTail1, p.cTail2);
					}
					const p = otherPlayers[id];
					const d = playerData[id];

					p.mesh.position.set(d.pos.x, d.pos.y, d.pos.z);
					p.mesh.quaternion.set(d.quat.x, d.quat.y, d.quat.z, d.quat.w);
					p.indicator.position.set(d.pos.x, d.pos.y + 2, d.pos.z);

					if (d.parts) {
						const t = d.parts;
						if (p.cHead)  p.cHead.rotation.set(t.head.rx,   t.head.ry,   t.head.rz);
						if (p.cWing1) p.cWing1.rotation.set(t.wing1.rx, t.wing1.ry,  t.wing1.rz);
						if (p.cWing2) p.cWing2.rotation.set(t.wing2.rx, t.wing2.ry,  t.wing2.rz);
						if (p.cTail1) p.cTail1.rotation.set(t.tail1.rx, t.tail1.ry,  t.tail1.rz);
						if (p.cTail2) p.cTail2.rotation.set(t.tail2.rx, t.tail2.ry,  t.tail2.rz);
					}

					const dist = cam.position.distanceTo(p.indicator.position);
					p.indicator.scale.setScalar(fovFactor * dist * desiredPixels / window.innerHeight);
					const worldDown = new THREE.Vector3(0, -1, 0);
					worldDown.transformDirection(cam.matrixWorldInverse);
					p.indicator.material.rotation = Math.atan2(worldDown.x, worldDown.y);
				}

				render.render(scene, cam)

			}
			anim();
		</script>
	</body>
